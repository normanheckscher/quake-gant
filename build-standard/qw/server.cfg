// Quake-GANT Orchestrator Configuration

// Engine Parameters
sv_progtype 1
sv_progsname qwprogs
localinfo adminpwd "changeme"

// KTX Game Mode Override
set k_defmode ffa
set k_mode 3
set k_matchless 1

// Bot Intelligence Initialization (3 Bots, Escalating Skills)
set k_fb_enabled 1
set k_fb_autoadd_limit 3
set k_fb_skill 10

// Statistical Extraction (JSON for Python Orchestrator)
set ktx_stats_json 1

// Map Rotation Configuration
set ktx_map_queue "dm3 dm4 dm6 aerowalk ztndm3"
localinfo ktx_map_rotate 1

// Initial map parameter
fraglimit 8
localinfo fraglimit 8
timelimit 3
localinfo timelimit 3
map dm3

// Anchor structural overrides explicitly against KTX defaults
sv_crypt_rcon 0
sv_rconlim 0
