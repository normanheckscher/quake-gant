[supervisord]
nodaemon=true
user=root

[program:mvdsv]
command=/bin/bash -c "/quake/mvdsv -port 27500 +exec server.cfg +rcon_password \"${ADMIN_PASSWORD:-changeme}\""
directory=/quake
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:webapi]
command=uvicorn main:app --host 0.0.0.0 --port 8000
directory=/web
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
